<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameTube | Arcade Hub</title>
    <!-- CSS Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { margin: 0; background-color: #020202; font-family: 'Inter', sans-serif; overflow: hidden; color: white; }
        #initial-loader { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #020202; z-index: 9999; flex-direction: column; gap: 1rem; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(6, 182, 212, 0.1); border-top-color: #06b6d4; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #111; border-radius: 10px; }
        .icon-container svg { width: 1.25rem; height: 1.25rem; }
    </style>
</head>
<body>
    <div id="initial-loader">
        <div class="spinner"></div>
        <div style="font-size: 10px; font-weight: 900; letter-spacing: 0.2em; color: #06b6d4;">INITIALIZING SYSTEMS...</div>
    </div>

    <div id="root"></div>

    <!-- Core Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- React Application -->
    <script type="text/babel">
        // Use global variables provided by UMD builds
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    lucide.createIcons({
                        icons: { [name]: lucide.icons[name] },
                        nameAttr: 'data-lucide',
                        attrs: { class: className || 'w-5 h-5' }
                    });
                }
            }, [name, className]);
            return <i ref={iconRef} data-lucide={name} className={`inline-flex items-center justify-center ${className}`}></i>;
        };

        const CATEGORIES = ['All', 'Action', 'Puzzle', 'Racing', 'Arcade'];
        const MOCK_GAMES = [
            { id: "g1", title: "Neon Breakout", views: "1.2M", thumb: "https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=600", isInternal: true },
            { id: "g2", title: "Pixel Client", views: "850K", thumb: "https://images.unsplash.com/photo-1605901309584-818e25960b8f?w=600", url: "https://pixelclient.xyz/" },
            { id: "g3", title: "Space Shooters", views: "3.4M", thumb: "https://images.unsplash.com/photo-1614729939124-032f0b56c9ce?w=600", url: "https://mario.com" }
        ];

        const InternalGame = () => {
            const canvasRef = useRef(null);
            const [gameState, setGameState] = useState('IDLE');
            const [score, setScore] = useState(0);

            useEffect(() => {
                if (gameState !== 'PLAYING') return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let x = canvas.width/2, y = canvas.height-30, dx = 4, dy = -4;
                let paddleX = (canvas.width-75)/2;
                let animationId;

                const draw = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = "#00f2ff";
                    ctx.beginPath(); ctx.arc(x, y, 8, 0, Math.PI*2); ctx.fill();
                    ctx.fillRect(paddleX, canvas.height-10, 75, 10);
                    if(x + dx > canvas.width-8 || x + dx < 8) dx = -dx;
                    if(y + dy < 8) dy = -dy;
                    else if(y + dy > canvas.height-8) {
                        if(x > paddleX && x < paddleX+75) dy = -dy;
                        else { setGameState('GAMEOVER'); return; }
                    }
                    x += dx; y += dy;
                    animationId = requestAnimationFrame(draw);
                };
                draw();
                const move = (e) => {
                    const rect = canvas.getBoundingClientRect();
                    paddleX = (e.clientX - rect.left) - 37.5;
                };
                canvas.addEventListener('mousemove', move);
                return () => { cancelAnimationFrame(animationId); canvas.removeEventListener('mousemove', move); };
            }, [gameState]);

            return (
                <div className="w-full h-full bg-black flex items-center justify-center relative">
                    <canvas ref={canvasRef} width={800} height={450} className="max-w-full max-h-full" />
                    {gameState !== 'PLAYING' && (
                        <div className="absolute inset-0 bg-black/90 flex flex-col items-center justify-center">
                            <h2 className="text-3xl font-black italic mb-6">{gameState === 'GAMEOVER' ? 'GAME OVER' : 'NEON BREAKOUT'}</h2>
                            <button onClick={() => {setScore(0); setGameState('PLAYING');}} className="bg-white text-black px-10 py-3 rounded-full font-black uppercase italic hover:bg-cyan-400 transition">
                                {gameState === 'GAMEOVER' ? 'Retry' : 'Start Game'}
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        const Navbar = ({ onHomeClick }) => (
            <nav className="fixed top-0 inset-x-0 h-16 bg-[#050505] border-b border-white/5 flex items-center justify-between px-6 z-50">
                <div className="flex items-center gap-2 cursor-pointer" onClick={onHomeClick}>
                    <div className="bg-cyan-500 p-1 rounded-lg"><Icon name="Gamepad2" className="text-black w-5 h-5" /></div>
                    <span className="font-black italic text-xl tracking-tighter uppercase">GAMETUBE</span>
                </div>
                <div className="hidden md:flex flex-1 max-w-md mx-10 relative">
                    <Icon name="Search" className="absolute left-3 top-1/2 -translate-y-1/2 text-white/20 w-4 h-4" />
                    <input className="w-full bg-white/5 border border-white/10 rounded-xl py-2 pl-10 pr-4 text-xs font-bold uppercase tracking-widest outline-none focus:border-cyan-500/50" placeholder="Search Database..." />
                </div>
                <div className="text-[10px] font-black text-white/20 border border-white/10 px-3 py-1.5 rounded-full uppercase tracking-widest">v2.0-STABLE</div>
            </nav>
        );

        const App = () => {
            const [view, setView] = useState({ type: 'GRID', data: null });
            useEffect(() => { document.getElementById('initial-loader').style.display = 'none'; }, []);

            return (
                <div className="min-h-screen pt-16">
                    <Navbar onHomeClick={() => setView({ type: 'GRID', data: null })} />
                    
                    {view.type === 'GRID' ? (
                        <div className="p-8 max-w-7xl mx-auto">
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                                {MOCK_GAMES.map(game => (
                                    <div key={game.id} className="group cursor-pointer" onClick={() => setView({ type: 'PLAYER', data: game })}>
                                        <div className="aspect-video rounded-2xl overflow-hidden bg-white/5 border border-white/5 group-hover:border-cyan-500 transition-all">
                                            <img src={game.thumb} className="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all opacity-50 group-hover:opacity-100" />
                                        </div>
                                        <h3 className="mt-4 font-black italic uppercase text-lg group-hover:text-cyan-400">{game.title}</h3>
                                        <p className="text-[10px] font-black text-white/20 uppercase tracking-widest mt-1">{game.views} Plays</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    ) : (
                        <div className="p-8 max-w-6xl mx-auto flex flex-col gap-6">
                            <div className="aspect-video rounded-[2rem] overflow-hidden border border-white/10 bg-black shadow-2xl">
                                {view.data.isInternal ? <InternalGame /> : <iframe src={view.data.url} className="w-full h-full border-none" allowFullScreen />}
                            </div>
                            <h1 className="text-4xl font-black italic uppercase tracking-tighter">{view.data.title}</h1>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
