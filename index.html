<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameTube | Arcade Hub</title>
    <!-- CSS Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { margin: 0; background-color: #020202; font-family: 'Inter', sans-serif; overflow: hidden; color: white; }
        #initial-loader { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #020202; z-index: 9999; flex-direction: column; gap: 1rem; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(6, 182, 212, 0.1); border-top-color: #06b6d4; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Pseudo-Fullscreen Fallback Class */
        .pseudo-fullscreen {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            z-index: 9999 !important;
            border-radius: 0 !important;
            margin: 0 !important;
            background: black !important;
        }

        .icon-container svg { width: 1.25rem; height: 1.25rem; }
    </style>
</head>
<body>
    <div id="initial-loader">
        <div class="spinner"></div>
        <div style="font-size: 10px; font-weight: 900; letter-spacing: 0.2em; color: #06b6d4;">SYNCING CORE...</div>
    </div>

    <div id="root"></div>

    <!-- Core Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    lucide.createIcons({
                        icons: { [name]: lucide.icons[name] },
                        nameAttr: 'data-lucide',
                        attrs: { class: className || 'w-5 h-5' }
                    });
                }
            }, [name, className]);
            return <i ref={iconRef} data-lucide={name} className={`inline-flex items-center justify-center ${className}`}></i>;
        };

        const MOCK_GAMES = [
            { id: "g1", title: "Neon Breakout", views: "5", thumb: "https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=600", isInternal: true },
            { id: "g2", title: "Pixel Client", views: "100k", thumb: "https://wallpapersok.com/images/high/minecraft-landscape-logo-qwrbdubxu5n1n2k7.webp", url: "https://pixelclient.xyz/" },
            { id: "g3", title: "Space Shooters", views: "1", thumb: "https://images.unsplash.com/photo-1614729939124-032f0b56c9ce?w=600", url: "https://mario.com" }
        ];

        const InternalGame = () => {
            const canvasRef = useRef(null);
            const [gameState, setGameState] = useState('IDLE');
            useEffect(() => {
                if (gameState !== 'PLAYING') return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let x = canvas.width/2, y = canvas.height-30, dx = 4, dy = -4;
                let paddleX = (canvas.width-75)/2;
                let anim;
                const draw = () => {
                    ctx.clearRect(0,0,canvas.width,canvas.height);
                    ctx.fillStyle="#00f2ff";
                    ctx.beginPath(); ctx.arc(x,y,8,0,Math.PI*2); ctx.fill();
                    ctx.fillRect(paddleX, canvas.height-10, 75, 10);
                    if(x+dx > canvas.width-8 || x+dx < 8) dx=-dx;
                    if(y+dy < 8) dy=-dy;
                    else if(y+dy > canvas.height-8) {
                        if(x > paddleX && x < paddleX+75) dy=-dy;
                        else { setGameState('GAMEOVER'); return; }
                    }
                    x+=dx; y+=dy; anim=requestAnimationFrame(draw);
                };
                draw();
                const move = (e) => {
                    const rect = canvas.getBoundingClientRect();
                    paddleX = (e.clientX - rect.left) - 37.5;
                };
                canvas.addEventListener('mousemove', move);
                return () => { cancelAnimationFrame(anim); canvas.removeEventListener('mousemove', move); };
            }, [gameState]);

            return (
                <div className="w-full h-full bg-black flex items-center justify-center">
                    <canvas ref={canvasRef} width={800} height={450} className="max-w-full max-h-full" />
                    {gameState !== 'PLAYING' && (
                        <div className="absolute inset-0 bg-black/90 flex flex-col items-center justify-center">
                            <button onClick={() => setGameState('PLAYING')} className="bg-white text-black px-10 py-3 rounded-full font-black uppercase italic hover:bg-cyan-400 transition">
                                {gameState === 'GAMEOVER' ? 'Retry' : 'Start'}
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        const PlayerView = ({ game }) => {
            const containerRef = useRef(null);
            const [isFull, setIsFull] = useState(false);

            const handleToggle = () => {
                const el = containerRef.current;
                if (!document.fullscreenElement) {
                    // Try Browser API
                    el.requestFullscreen().catch(() => {
                        // If blocked, use Pseudo-Fullscreen
                        setIsFull(true);
                    });
                } else {
                    document.exitFullscreen();
                }
            };

            useEffect(() => {
                const handler = () => setIsFull(!!document.fullscreenElement);
                document.addEventListener('fullscreenchange', handler);
                const handleEsc = (e) => { if (e.key === 'Escape') setIsFull(false); };
                window.addEventListener('keydown', handleEsc);
                return () => {
                    document.removeEventListener('fullscreenchange', handler);
                    window.removeEventListener('keydown', handleEsc);
                };
            }, []);

            return (
                <div className="p-8 max-w-6xl mx-auto flex flex-col gap-6">
                    <div 
                        ref={containerRef} 
                        className={`aspect-video bg-black relative group transition-all duration-300 shadow-2xl overflow-hidden
                        ${isFull ? 'pseudo-fullscreen' : 'rounded-[2rem] border border-white/10'}`}
                    >
                        {game.isInternal ? <InternalGame /> : (
                            <iframe 
                                src={game.url} 
                                className="w-full h-full border-none" 
                                allow="autoplay; gamepad; fullscreen" 
                                title={game.title}
                            />
                        )}
                        
                        <div className="absolute top-4 right-4 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onClick={handleToggle} className="bg-white/10 hover:bg-white/20 backdrop-blur-md p-3 rounded-full border border-white/10 text-white">
                                <Icon name={isFull ? "Minimize" : "Maximize"} className="w-5 h-5" />
                            </button>
                        </div>
                    </div>

                    <div className="flex justify-between items-center">
                        <h1 className="text-4xl font-black italic uppercase tracking-tighter">{game.title}</h1>
                        <button onClick={handleToggle} className="flex items-center gap-2 bg-cyan-500 text-black px-6 py-3 rounded-xl font-bold uppercase text-xs hover:bg-cyan-400">
                            <Icon name="Maximize" className="w-4 h-4" /> Go Fullscreen
                        </button>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [view, setView] = useState({ type: 'GRID', data: null });
            useEffect(() => { document.getElementById('initial-loader').style.display = 'none'; }, []);

            return (
                <div className="min-h-screen pt-16 bg-[#020202]">
                    <nav className="fixed top-0 inset-x-0 h-16 bg-[#050505] border-b border-white/5 flex items-center justify-between px-6 z-50">
                        <div className="flex items-center gap-2 cursor-pointer" onClick={() => setView({type:'GRID'})}>
                            <div className="bg-cyan-500 p-1 rounded-lg"><Icon name="Gamepad2" className="text-black w-5 h-5" /></div>
                            <span className="font-black italic text-xl uppercase tracking-tighter">GAMETUBE</span>
                        </div>
                    </nav>
                    
                    {view.type === 'GRID' ? (
                        <div className="p-8 max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8">
                            {MOCK_GAMES.map(g => (
                                <div key={g.id} className="group cursor-pointer" onClick={() => setView({type:'PLAYER', data:g})}>
                                    <div className="aspect-video rounded-2xl overflow-hidden border border-white/5 group-hover:border-cyan-500 transition-all">
                                        <img src={g.thumb} className="w-full h-full object-cover grayscale opacity-50 group-hover:grayscale-0 group-hover:opacity-100 transition-all" />
                                    </div>
                                    <h3 className="mt-4 font-black italic uppercase text-lg">{g.title}</h3>
                                </div>
                            ))}
                        </div>
                    ) : (
                        <PlayerView game={view.data} />
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
